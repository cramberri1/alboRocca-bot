<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albo Pretorio – Comune di Roccabascerana</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
            color: #333;
        }
        .box {
            background: white;
            border-radius: 12px;
            padding: 2rem 2.5rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #0066cc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #666; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="box">
        <div class="spinner"></div>
        <strong>Apertura Albo Pretorio…</strong>
        <p>Comune di Roccabascerana</p>
    </div>

    <!-- Form che si auto-invia con POST verso il portale Halley -->
    <form id="albo" method="POST"
          action="https://www.comune.roccabascerana.av.it/EG0/EGHOMEPAGE.HBL"
          style="display:none;">
        <input type="hidden" name="ss"     value="1">
        <input type="hidden" name="F"      value="MC09">
        <input type="hidden" name="en"     value="e1396">
        <input type="hidden" name="freeze" value="1">
    </form>

    <script>
        // Invia il form automaticamente al caricamento della pagina
        window.onload = function() {
            document.getElementById('albo').submit();
        };
    </script>
</body>
</html>
