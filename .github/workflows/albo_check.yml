name: Albo Pretorio Check

on:
  schedule:
    - cron: '0 9,15,21 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Installa Playwright
        run: python -m playwright install chromium

      - name: Esegui bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
        run: timeout 21000 python bot.py || true

      - name: Salva database nel repository
        run: |
          git config user.name "AlboBot"
          git config user.email "bot@alborocca"
          git add seen_items.json subscribers.json || true
          git diff --staged --quiet || git commit -m "aggiornamento database [skip ci]"
          git push || true
